# Advanced mode only.
# This lets the wrapper ask Docker to start/stop sibling model containers.
# Mounting docker.sock grants powerful host control; keep this opt-in.
services:
  rasputin-wrapper:
    build:
      target: runtime-docker-control
    environment:
      WRAPPER_DOCKER_CONTROL: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
