name: rasputin-test

services:
  rasputin-wrapper-test:
    image: rasputin-wrapper:test
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - "127.0.0.1:${RASPUTIN_TEST_PORT:-8877}:8787"
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      WRAPPER_RUNTIME: docker
      RASPUTIN_ENV: test
      RASPUTIN_TEST_AUTH_BYPASS: "1"
      RASPUTIN_COOKIE_SECURE: "0"
      RASPUTIN_LOCALHOST_BYPASS: "0"
      RASPUTIN_WARSAT_FAKE_DEPLOY: "1"
      MAIN_VLLM_BASE_URL: ${MAIN_VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      CONTAINER_MODELS_DIR: /app/models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${RASPUTIN_TEST_DATA_DIR:-./testdata/data}:/app/data
      - ${RASPUTIN_TEST_WORKSPACE_DIR:-./testdata/workspace}:/app/workspace
      - ./models:/app/models:ro
      - ./tests:/app/tests:ro
    restart: "no"
