name: rasputin

services:
  rasputin-wrapper:
    image: rasputin-wrapper:latest
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - "127.0.0.1:${WRAPPER_PORT:-8787}:8787"
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      WRAPPER_RUNTIME: docker
      RASPUTIN_COOKIE_SECURE: "0"
      RASPUTIN_LOCALHOST_BYPASS: ${RASPUTIN_LOCALHOST_BYPASS:-0}
      MAIN_VLLM_BASE_URL: ${MAIN_VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      CONTAINER_MODELS_DIR: /app/models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Runtime store (SQLite + KV state) lives in a named volume, OFF the Docker
      # Desktop bind mount -- fixes the SQLite-over-bind-mount flakiness (G4) and
      # unifies the former split ./data + ./data/wrapper into one location.
      # Migrate existing bind-mount data with: .\rasputin.ps1 migrate-data
      - rasputin-data:/app/data
      - ./workspace:/app/workspace
      - ./models:/app/models:ro
    restart: "no"

  chroma:
    profiles: ["rag"]
    image: chromadb/chroma:latest
    ports:
      - "127.0.0.1:8008:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    restart: "no"

  searxng:
    profiles: ["search"]
    image: searxng/searxng:latest
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./data/searxng:/etc/searxng
    restart: "no"

volumes:
  # Wrapper runtime store. Populated on existing installs by `rasputin.ps1
  # migrate-data`; auto-created empty (fresh bootstrap) on new installs.
  rasputin-data:
