<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rasputin Command Center</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="command-center">
    <!-- Header -->
    <header class="header">
        <div class="logo">Rasputin</div>
        <div class="status-bar">
            <span class="status-item">System: Ready</span>
            <span class="status-item">Memory: 8GB/16GB</span>
            <span class="status-item">Agent: Active</span>
        </div>
        <div class="user-settings">
            <button class="setting-btn">Settings</button>
        </div>
    </header>

    <!-- Workspace Selector -->
    <div class="workspace-selector">
        <div class="mode-card research active" data-mode="research">
            Research
        </div>
        <div class="mode-card documents" data-mode="documents">
            Documents
        </div>
        <div class="mode-card coding" data-mode="coding">
            Coding
        </div>
        <div class="mode-card general" data-mode="general">
            General
        </div>
    </div>

    <!-- Main Workspace -->
    <main class="workspace">
        <!-- Quick Action Center -->
        <div class="quick-action">
            <h2>Objective</h2>
            <input type="text" class="objective-input" placeholder="Enter your objective here...">
        </div>

        <!-- Contextual Sidebar -->
        <aside class="sidebar">
            <h3>Recent Activity</h3>
            <div class="activity-list">
                <!-- Activity items will be dynamically populated -->
            </div>
            <h3>Active Knowledge</h3>
            <div class="knowledge-status">
                <span>Index: Ready</span>
                <span>Graph: Ready</span>
            </div>
        </aside>
    </main>
</body>
</html>
