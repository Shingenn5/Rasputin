<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#eee9df" />
    <title>Rasputin</title>
    <script>
      (function () {
        var themes = {
          "rasputin-light": { bg: "#eee9df", text: "#20231f", accent: "#c24f32", a1: "rgba(194, 79, 50, 0.18)", a2: "rgba(39, 84, 91, 0.12)", a3: "rgba(210, 148, 70, 0.10)", dark: false },
          "rasputin-dark": { bg: "#10120f", text: "#ece8de", accent: "#de6545", a1: "rgba(222, 101, 69, 0.18)", a2: "rgba(76, 126, 132, 0.12)", a3: "rgba(205, 149, 79, 0.10)", dark: true },
          "contrast": { bg: "#ffffff", text: "#000000", accent: "#005fcc", a1: "rgba(0, 95, 204, 0.2)", a2: "rgba(0, 0, 0, 0.1)", a3: "rgba(0, 95, 204, 0.1)", dark: false },
          "bootswatch-slate": { bg: "#272b30", text: "#e8edf0", accent: "#d85b32", a1: "rgba(216, 91, 50, 0.5)", a2: "rgba(56, 130, 246, 0.42)", a3: "rgba(130, 90, 255, 0.4)", dark: true },
          "bootswatch-cyborg": { bg: "#060606", text: "#e8edf0", accent: "#ff5b45", a1: "rgba(255, 91, 69, 0.5)", a2: "rgba(40, 40, 40, 0.6)", a3: "rgba(255, 0, 0, 0.4)", dark: true },
          "bootswatch-darkly": { bg: "#222222", text: "#e8edf0", accent: "#00bc8c", a1: "rgba(0, 188, 140, 0.5)", a2: "rgba(52, 152, 219, 0.4)", a3: "rgba(155, 89, 182, 0.4)", dark: true },
          "bootswatch-lux": { bg: "#f7f7f7", text: "#1a1a1a", accent: "#1a1a1a", a1: "rgba(0, 0, 0, 0.1)", a2: "rgba(100, 100, 100, 0.1)", a3: "rgba(0, 0, 0, 0.05)", dark: false },
          "bootswatch-solar": { bg: "#002b36", text: "#93a1a1", accent: "#b58900", a1: "rgba(181, 137, 0, 0.5)", a2: "rgba(42, 161, 152, 0.4)", a3: "rgba(203, 75, 22, 0.4)", dark: true },
          "bootswatch-superhero": { bg: "#2b3e50", text: "#ebebeb", accent: "#df691a", a1: "rgba(223, 105, 26, 0.5)", a2: "rgba(91, 192, 222, 0.4)", a3: "rgba(240, 173, 78, 0.4)", dark: true },
          "cyberpunk-neon": { bg: "#09031c", text: "#e0e0e0", accent: "#ff0099", a1: "rgba(255, 0, 153, 0.5)", a2: "rgba(0, 255, 255, 0.42)", a3: "rgba(204, 0, 255, 0.4)", dark: true },
          "ocean-abyss": { bg: "#010b14", text: "#e0f2f1", accent: "#00ccff", a1: "rgba(0, 204, 255, 0.5)", a2: "rgba(0, 153, 204, 0.42)", a3: "rgba(0, 102, 255, 0.4)", dark: true },
          "hacker-matrix": { bg: "#000000", text: "#00ff00", accent: "#00ff00", a1: "rgba(0, 255, 0, 0.4)", a2: "rgba(0, 200, 0, 0.3)", a3: "rgba(0, 100, 0, 0.5)", dark: true },
          "crimson-forge": { bg: "#0f0a0a", text: "#f0e6e6", accent: "#ff3333", a1: "rgba(255, 51, 51, 0.5)", a2: "rgba(204, 0, 0, 0.4)", a3: "rgba(255, 102, 0, 0.4)", dark: true },
          "nord-frost": { bg: "#2e3440", text: "#eceff4", accent: "#88c0d0", a1: "rgba(136, 192, 208, 0.5)", a2: "rgba(129, 161, 193, 0.4)", a3: "rgba(180, 142, 173, 0.4)", dark: true },
          "violet-circuit": { bg: "#151126", text: "#eee9ff", accent: "#9b7cf8", a1: "rgba(155, 124, 248, 0.34)", a2: "rgba(88, 204, 255, 0.18)", a3: "rgba(232, 121, 249, 0.16)", dark: true },
          "evergreen-console": { bg: "#0f1813", text: "#e3eee6", accent: "#63c174", a1: "rgba(99, 193, 116, 0.28)", a2: "rgba(65, 176, 156, 0.18)", a3: "rgba(190, 154, 79, 0.14)", dark: true },
          "ember-noir": { bg: "#1a1210", text: "#f5e9df", accent: "#e97842", a1: "rgba(233, 120, 66, 0.30)", a2: "rgba(196, 83, 65, 0.18)", a3: "rgba(239, 176, 91, 0.14)", dark: true },
          "porcelain-blue": { bg: "#edf4f8", text: "#1d2b35", accent: "#276c9b", a1: "rgba(39, 108, 155, 0.15)", a2: "rgba(69, 142, 164, 0.11)", a3: "rgba(91, 105, 168, 0.09)", dark: false },
          "sepia-studio": { bg: "#f1e7d2", text: "#352a20", accent: "#a6532c", a1: "rgba(166, 83, 44, 0.16)", a2: "rgba(122, 104, 63, 0.11)", a3: "rgba(190, 132, 55, 0.10)", dark: false },
          "orchid-paper": { bg: "#f7f0f5", text: "#352b35", accent: "#88416f", a1: "rgba(136, 65, 111, 0.15)", a2: "rgba(100, 91, 160, 0.10)", a3: "rgba(190, 104, 143, 0.09)", dark: false }
        };
        function normalize(theme) {
          return themes[theme] ? theme : "rasputin-dark";
        }
        function hexToRgb(hex) {
          var m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
          return m ? parseInt(m[1], 16) + ", " + parseInt(m[2], 16) + ", " + parseInt(m[3], 16) : "189, 74, 40";
        }
        function ensure(selector, tag, attrs) {
          var node = document.querySelector(selector);
          if (!node) {
            node = document.createElement(tag);
            Object.keys(attrs || {}).forEach(function (key) { node.setAttribute(key, attrs[key]); });
            document.head.appendChild(node);
          }
          return node;
        }
        function apply(theme) {
          var selected = normalize(theme);
          var cfg = themes[selected];
          var root = document.documentElement;
          root.dataset.theme = selected;
          if (cfg.dark) root.classList.add("dark");
          else root.classList.remove("dark");
          root.dataset.bsTheme = cfg.dark ? "dark" : "light";
          root.dataset.contrast = selected === "contrast" ? "true" : "false";
          root.style.background = cfg.bg;
          
          root.style.setProperty("--base-bg", cfg.bg);
          root.style.setProperty("--base-text", cfg.text);
          root.style.setProperty("--base-accent", cfg.accent);
          root.style.setProperty("--bs-primary-rgb", hexToRgb(cfg.accent));
          root.style.setProperty("--aurora-1", cfg.a1);
          root.style.setProperty("--aurora-2", cfg.a2);
          root.style.setProperty("--aurora-3", cfg.a3);

          ensure("meta[name='theme-color']", "meta", { name: "theme-color" }).setAttribute("content", cfg.bg);
          var icon = ensure("link[rel='icon']", "link", { rel: "icon" });
          var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="' + cfg.bg + '"/><path d="M14 32h36M32 14v36M20 20l24 24M44 20 20 44" stroke="' + cfg.accent + '" stroke-width="3" stroke-linecap="round" opacity=".72"/><circle cx="32" cy="32" r="11" fill="none" stroke="' + cfg.accent + '" stroke-width="4"/><text x="32" y="37" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="' + cfg.accent + '">R</text></svg>';
          icon.setAttribute("href", "data:image/svg+xml," + encodeURIComponent(svg));
          return selected;
        }
        window.rasputinTheme = { apply: apply, normalize: normalize, themes: themes };
        apply(localStorage.getItem("rasputin-theme") || "rasputin-light");
      })();
    </script>
    <style>
      html, body, #root { min-height: 100%; }
      body {
        margin: 0;
        background: var(--base-bg, #eee9df);
        color: var(--base-text, #20231f);
      }
      #rasputinLoader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, var(--aurora-1, rgba(189, 74, 40, .12)), transparent 34%),
          linear-gradient(90deg, color-mix(in srgb, var(--base-accent, #c24f32) 6%, transparent) 1px, transparent 1px),
          linear-gradient(0deg, color-mix(in srgb, var(--base-accent, #c24f32) 6%, transparent) 1px, transparent 1px),
          var(--base-bg, #eee9df);
        background-size: auto, 38px 38px, 38px 38px, auto;
        transition: opacity .24s ease, visibility .24s ease;
      }
      body[data-ready="true"] #rasputinLoader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loader-core {
        width: 54px;
        height: 54px;
        border: 1px solid color-mix(in srgb, var(--base-accent, #c24f32) 42%, transparent);
        border-radius: 16px;
        display: grid;
        place-items: center;
        color: var(--base-accent, #c24f32);
        font: 700 18px/1 "Rajdhani", system-ui, sans-serif;
        box-shadow: 0 12px 36px rgba(32, 35, 31, .12);
        animation: loaderPulse 1.2s ease-in-out infinite;
      }
      @keyframes loaderPulse {
        50% { transform: scale(.96); opacity: .72; }
      }
    </style>
  </head>
  <body>
    <div id="rasputinLoader" aria-hidden="true"><div class="loader-core">R</div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
